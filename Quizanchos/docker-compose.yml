services:
  db:
    image: postgres:17-alpine
    container_name: quizanchos-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quizanchos}
      POSTGRES_USER: ${POSTGRES_USER:-quizanchos}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-quizanchos} -d ${POSTGRES_DB:-quizanchos}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  app:
    # Context is the repo root so the Dockerfile can see both Quizanchos/ (host)
    # and Minigames/ (third-party plugin solution). The image bakes plugins into
    # /app/plugins; mount the `plugins` named volume below to add more at runtime.
    build:
      context: ..
      dockerfile: Quizanchos/Dockerfile
    image: ${IMAGE:-ghcr.io/navarti/quizanchos:local}
    container_name: quizanchos
    restart: unless-stopped
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs
      - dataprotection-keys:/home/app/.aspnet/DataProtection-Keys
      # Optional: mount a host folder over /app/plugins to drop in extra plugins
      # without rebuilding the image. Activate it via docker-compose.plugins.yml.
    ports:
      - "${APP_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    profiles: ["tunnel"]
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${CF_TUNNEL_TOKEN}
    depends_on:
      - app

volumes:
  pgdata:
  dataprotection-keys:
