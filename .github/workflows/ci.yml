name: CI

# Build & test the host, pack the SDK, then build & publish every plugin
# against the freshly-packed SDK so we catch breakage in either direction.

on:
  push:
    branches: [master, main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: 1

jobs:
  host:
    name: Build & test host
    runs-on: ubuntu-latest
    outputs:
      sdk-version: ${{ steps.pack.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx', '**/packages.lock.json') }}
          restore-keys: nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Quizanchos/Quizanchos.slnx

      - name: Build (Release)
        run: dotnet build Quizanchos/Quizanchos.slnx -c Release --no-restore

      - name: Test
        run: |
          dotnet test Quizanchos/Quizanchos.slnx -c Release --no-build \
            --logger "trx;LogFileName=test-results.trx" \
            --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: host-test-results
          path: TestResults/**/*.trx
          if-no-files-found: ignore

      - name: Pack Quizanchos.Core / Quizanchos.Common
        id: pack
        run: |
          dotnet pack Quizanchos/Quizanchos.Common/Quizanchos.Common.csproj -c Release -o nupkgs --no-build
          dotnet pack Quizanchos/Quizanchos.Core/Quizanchos.Core.csproj     -c Release -o nupkgs --no-build
          version=$(grep -oP '(?<=<Version>)[^<]+' Quizanchos/Quizanchos.Core/Quizanchos.Core.csproj | head -n1)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Packed SDK version: $version"

      - name: Upload SDK nupkgs
        uses: actions/upload-artifact@v4
        with:
          name: sdk-nupkgs
          path: nupkgs/*.*nupkg
          retention-days: 14

  plugins:
    name: Build plugin / ${{ matrix.plugin }}
    needs: host
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        plugin:
          - Caravan
          - CaravanMultiplayer
          - CountryGuesser
          - CountryGuesserMultiplayer
          - Game2048
          - TicketToRideEurope
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Download SDK nupkgs
        uses: actions/download-artifact@v4
        with:
          name: sdk-nupkgs
          path: Quizanchos/nupkgs

      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-plugin-${{ runner.os }}-${{ hashFiles('Minigames/**/*.csproj') }}
          restore-keys: nuget-plugin-${{ runner.os }}-

      - name: Publish plugin
        working-directory: Minigames
        run: |
          dotnet publish "Quizanchos.Plugin.${{ matrix.plugin }}/Quizanchos.Plugin.${{ matrix.plugin }}.csproj" \
            -c Release -o "publish/${{ matrix.plugin }}" \
            /p:UseAppHost=false /p:ErrorOnDuplicatePublishOutputFiles=false

      - name: Strip host-provided assemblies
        # Same trim as the Dockerfile — keep the plugin DLL, plugin.json,
        # wwwroot/, and any extra runtime data, drop SDK assemblies the host
        # already loads to avoid type-identity drift in the plugin load context.
        run: |
          cd "Minigames/publish/${{ matrix.plugin }}"
          rm -f Quizanchos.Core.dll Quizanchos.Core.pdb \
                Quizanchos.Common.dll Quizanchos.Common.pdb \
                Microsoft.Extensions.DependencyInjection.Abstractions.dll \
                Microsoft.Extensions.Logging.Abstractions.dll

      - name: Zip plugin
        working-directory: Minigames/publish
        run: zip -r "../${{ matrix.plugin }}.zip" "${{ matrix.plugin }}"

      - name: Upload plugin artifact
        uses: actions/upload-artifact@v4
        with:
          name: plugin-${{ matrix.plugin }}
          path: Minigames/${{ matrix.plugin }}.zip
          retention-days: 14
