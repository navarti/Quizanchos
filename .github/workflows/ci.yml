name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore Quizanchos/Quizanchos.slnx

      - name: Build
        run: dotnet build Quizanchos/Quizanchos.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Quizanchos/Quizanchos.slnx --configuration Release --no-build --verbosity normal
