name: Release SDK

# Publish Quizanchos.Core + Quizanchos.Common to NuGet.org so third-party
# plugin authors can `dotnet add package Quizanchos.Core` from any machine.
#
# Tag format: sdk/v<Version>  (must match the <Version> in the csproj files)
#   sdk/v0.1.2
#
# NUGET_API_KEY must be set as a repo secret.

on:
  push:
    tags: ['sdk/v*']
  workflow_dispatch:

env:
  DOTNET_NOLOGO: 1
  DOTNET_CLI_TELEMETRY_OPTOUT: 1

jobs:
  publish:
    name: Pack & push to NuGet.org
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Verify tag matches csproj <Version>
        if: github.event_name == 'push'
        run: |
          tag_version="${GITHUB_REF#refs/tags/sdk/v}"
          core_version=$(grep -oP '(?<=<Version>)[^<]+' Quizanchos/Quizanchos.Core/Quizanchos.Core.csproj | head -n1)
          common_version=$(grep -oP '(?<=<Version>)[^<]+' Quizanchos/Quizanchos.Common/Quizanchos.Common.csproj | head -n1)
          echo "tag=$tag_version  core=$core_version  common=$common_version"
          if [[ "$tag_version" != "$core_version" || "$tag_version" != "$common_version" ]]; then
            echo "::error::Tag version $tag_version does not match Core ($core_version) / Common ($common_version) <Version> in csproj"
            exit 1
          fi

      - name: Pack
        run: |
          dotnet pack Quizanchos/Quizanchos.Common/Quizanchos.Common.csproj -c Release -o nupkgs
          dotnet pack Quizanchos/Quizanchos.Core/Quizanchos.Core.csproj     -c Release -o nupkgs

      - name: Push to NuGet.org
        env:
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: |
          if [[ -z "$NUGET_API_KEY" ]]; then
            echo "::error::NUGET_API_KEY repo secret is not set"
            exit 1
          fi
          # --skip-duplicate so re-running doesn't fail if a package is already there.
          dotnet nuget push 'nupkgs/*.nupkg' \
            --source https://api.nuget.org/v3/index.json \
            --api-key "$NUGET_API_KEY" \
            --skip-duplicate

      - name: Create GitHub Release (tag-triggered)
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v2
        with:
          name: 'SDK ${{ github.ref_name }}'
          body: |
            Published `Quizanchos.Core` and `Quizanchos.Common` to NuGet.org.

            Plugin authors:
            ```bash
            dotnet add package Quizanchos.Core
            ```
          files: nupkgs/*.*nupkg
